server.document-root = "/home/ali-abdullah-nasiri/.git-repositories/MyPortfolio"

server.bind = "127.0.0.1"
server.port = 80

server.username = "ali-abdullah-nasiri"
server.groupname = "ali-abdullah-nasiri"

index-file.names = ("index.html")

server.modules = (
    "mod_access",
    "mod_proxy",
    "mod_accesslog",
    "mod_compress"
)

mimetype.assign = (
    ".html" => "text/html",
    ".css"  => "text/css",
    ".js"   => "text/javascript",
    ".json" => "application/json",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".jpeg" => "image/jpeg",
    ".gif"  => "image/gif",
    ".svg"  => "image/svg+xml",
    ".woff" => "font/woff",
    ".woff2"=> "font/woff2",
    ".ttf"  => "font/ttf"
)

accesslog.filename = "/tmp/lighttpd-access.log"

accesslog.format = "%h %s %r %v%U %t '%{User-Agent}i'"

server.errorlog = "/tmp/lighttpd-error.log"

compress.cache-dir = "/tmp/lighttpd-compress/"
compress.filetype = (
    "text/html",
    "text/plain",
    "text/css",
    "application/javascript",
    "application/json",
    "image/svg+xml"
)

$HTTP["url"] =~ "\.(css|js|png|jpg|jpeg|gif|svg|woff|woff2)$" {
    expire.url = ( "" => "access 7 days" )
}

proxy.server = (
    "" => (
        (
            "host" => "127.0.0.1",
            "port" => 5000
        )
    )
)
