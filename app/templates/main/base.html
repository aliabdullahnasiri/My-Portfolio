<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or 'App' }} · {{ PROJECT_TITLE }}</title>

    {% block style %}
    <!-- Animate.css (used with WOW.js) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Satoshi Font (you already have CDN, keep it) -->
    <link href="https://fonts.cdnfonts.com/css/satoshi?styles=135009,135005,135007,135002,135000" rel="stylesheet"/>

    <!-- Font Awesome 5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

    <!-- Slick Slider CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css"/>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>

    <!-- Your custom CSS (keep local) -->
    <link href="{{ url_for('static', filename='main/assets/css/style.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='main/assets/css/responsive.css') }}" rel="stylesheet"/>
    {% endblock %}
  </head>
  <body>
    <!--  Preloader Start  -->
    <div class="preloader"></div>
    <!--  Preloader End  -->

    {% block main %}
    <main
      data-bs-spy="scroll"
      data-bs-target="#d2c_main_nav"
      class="position-relative"
    >
      {% block content %} {% endblock %}

      <!-- Scroll Button Start -->
      <div id="scrollBtn">
        <a href="#">
          <i class="fas fa-chevron-up"></i>
        </a>
      </div>
      <!-- Scroll Button  End -->
    </main>
    {% endblock %}

    {% block script %}
    <!-- jQuery 3.5.1 -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- WOW.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>

    <!-- Bootstrap 5 Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Slick Slider -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>

    <!-- SweetAlert -->
    <script
      src="{{ url_for('static', filename='main/plugins/sweetalert/sweetalert.js') }}"
    ></script>

    <!-- SocketIO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script
      src="{{ url_for('static', filename='main/assets/js/form.js') }}"
    ></script>

    <script
      src="{{ url_for('static', filename='main/assets/js/main.js') }}"
    ></script>

    {% endblock %}
  </body>
</html>
