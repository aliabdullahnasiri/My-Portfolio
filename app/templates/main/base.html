<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or 'App' }} · {{ PROJECT_TITLE }}</title>

    {% block style %}
    <!-- Animate CSS Link -->
    <link
      href="{{ url_for('static', filename='main/plugins/WOW-master/css/libs/animate.css') }}"
      rel="stylesheet"
    />
    <!-- Font CDN Link -->
    <link
      href="https://fonts.cdnfonts.com/css/satoshi?styles=135009,135005,135007,135002,135000"
      rel="stylesheet"
    />
    <!-- Font Awesome 5 CDN/ Icon Link -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Slider CSS Link -->
    <link
      href="{{ url_for('static', filename='main/plugins/slick-1.8.1/slick/slick.css') }}"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='main/plugins/slick-1.8.1/slick/slick-theme.css') }}"
      rel="stylesheet"
    />
    <!-- Bootstarp CSS -->
    <link
      href="{{ url_for('static', filename='main/plugins/bootstrap-5/css/bootstrap.min.css') }}"
      rel="stylesheet"
    />
    <!-- Main CSS -->
    <link
      href="{{ url_for('static', filename='main/assets/css/style.css') }}"
      rel="stylesheet"
    />
    <!-- Responsive CSS -->
    <link
      href="{{ url_for('static', filename='main/assets/css/responsive.css') }}"
      rel="stylesheet"
    />
    {% endblock %}
  </head>
  <body>
    <!--  Preloader Start  -->
    <div class="preloader"></div>
    <!--  Preloader End  -->

    {% include "main/components/header.html" %}
    {% block main %}
    <main
      data-bs-spy="scroll"
      data-bs-target="#d2c_main_nav"
      class="position-relative"
    >
      {% block content %} {% endblock %}
      <div class="d2c_copy_right_wrapper">
        <div class="container">
          <div class="row align-items-center">
            <div class="col-md-6 mb-3 mb-md-0">
              <p class="mb-0 text-center text-md-start">
                ©
                <script>
                  document.write(new Date().getFullYear());
                </script>
                2025, made with <i class="fa fa-heart red"></i> by <span class="fw-bold">{{ DEVELOPER }}</span> for <span class="fw-bold">{{ PROJECT_TITLE }}</span>.
              </p>
            </div>
            <div
              class="col-md-6 d-flex justify-content-center justify-content-md-end"
            >
            </div>
          </div>
        </div>
      </div>

      <!-- Scroll Button Start -->
      <div id="scrollBtn">
        <a href="#">
          <i class="fas fa-chevron-up"></i>
        </a>
      </div>
      <!-- Scroll Button  End -->
    </main>
    {% endblock %}

    {% block script %}
    <!-- JS CDN -->
    <script src="{{ url_for('static', filename='main/plugins/jquery-3.5.1/jquery-3.5.1.min.js') }}"></script>

    <!-- WOW Animation JS -->
    <script
      src="{{ url_for('static', filename='main/plugins/WOW-master/dist/wow.min.js') }}"
    ></script>
    <!-- Bootstrap JS -->
    <script
      src="{{ url_for('static', filename='main/plugins/bootstrap-5/js/bootstrap.bundle.min.js') }}"
    ></script>
    <!-- Slider JS Link -->
    <script
      src="{{ url_for('static', filename='main/plugins/slick-1.8.1/slick/slick.min.js') }}"
    ></script>
    <!-- Main JS Link -->
    <script
      src="{{ url_for('static', filename='main/assets/js/main.js') }}"
    ></script>
    {% endblock %}
  </body>
</html>
