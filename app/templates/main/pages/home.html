{% extends "main/base.html" %}

{% block content %}
  <!-- Hero Section Start -->
  <section class="d2c_hero_wrapper" id="home">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-md col-lg-6 order-1 order-lg-0 wow fadeInLeft">
          <h4 class="mb-2">Hello I'm</h4>
          <h1 class="text-white mb-xl-3 mb-lg-2">
            {{ profile.user.first_name }} {{ profile.user.middle_name }} <span class="d-block">{{ profile.user.last_name }}</span>
          </h1>
          <h5>{{ profile.headline }}</h5>
          <p class="pe-5">
            {{ profile.short_bio }}
          </p>
          <a href="#about" class="btn">Get started</a>
          <a href="#services" class="btn d2c_secondary_btn ms-4">Learn more</a>
        </div>
        <div
          class="col-md-md col-lg-6 d-flex justify-content-center justify-content-lg-end order-0 order-lg-1 mb-4 mb-md-5 mb-lg-0 wow fadeInRight"
        >
          <div class="d2c_img_wrapper position-relative">
            <img
                src="{{ profile.avatar_url }}"
              class="w-100 h-100"
              alt="Hero Image"
            />
            <div class="d2c_img_overlay"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Hero Section End -->
{% endblock %}
