<section
  class="d2c_about_wrapper"
  id="about"
  data-title="About · {{ PROJECT_TITLE }}"
>
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-12 col-lg-6 mb-4 mb-md-5 mb-lg-0 wow fadeInLeft">
        <div class="d2c_img_wrapper position-relative">
          <img
            src="{{ profile.avatar_url }}"
            class="w-100 h-100"
            alt="About Image"
          />
          <div class="d2c_img_overlay"></div>
        </div>
      </div>
      <div class="col-md-12 col-lg-6 wow fadeInRight px-4">
        <h2>Quick know about myself</h2>
        <p>{{ profile.bio }}</p>
        <a href="#contact" class="btn">Contact me</a>
        <a
          class="fs-6 btn d2c_secondary_btn"
          href="{{ url_for('main.resume_pdf')}}"
          >Download Resume (CV)</a
        >
      </div>
    </div>
  </div>
</section>
