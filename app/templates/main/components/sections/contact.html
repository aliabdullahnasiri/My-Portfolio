<!-- Contact Section Start -->
<section id="contact">
  <div class="container">
    <div class="row">
      <div
        class="col-md-10 col-lg-6 offset-md-1 offset-lg-3 text-center wow fadeInDown"
      >
        <h2>Get in touch with me</h2>
        <p class="px-0 px-md-5">
          I'm an Cyber Security specialist with experience in a variety of
          related fields, including network security.
        </p>
      </div>
    </div>
    <div class="row wow fadeInUp">
      <div class="col-md-10 col-lg-8 offset-md-1 offset-lg-2">
        <form class="row g-3 needs-validation" novalidate>
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="validationCustomFirstName"
                placeholder="John"
                required
              />
              <label for="validationCustomFirstName">First Name</label>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="validationCustomLastName"
                placeholder="Doe"
                required
              />
              <label for="validationCustomLastName">Last Name</label>
            </div>
          </div>

          <div class="col-md-12">
            <div class="form-floating">
              <input
                type="email"
                class="form-control"
                id="validationCustomEmail"
                placeholder="you@company.com"
                required
              />
              <label for="validationCustomEmail">Email Address</label>
            </div>
          </div>

          <div class="col-md-12">
            <div class="form-floating">
              <textarea
                class="form-control"
                placeholder="Write a brief message..."
                id="validationCustomMessage"
                style="height: 120px"
                required
              ></textarea>
              <label for="validationCustomMessage">Describe your problem</label>
            </div>
          </div>

          <div class="col-12 text-center">
            <button class="btn btn-primary" type="submit">Send Message</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
<!-- Contact Section End -->
