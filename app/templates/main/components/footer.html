<div class="d2c_copy_right_wrapper">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-8 col-lg-6 col-sm-12 mb-3 mb-md-0">
        <p class="mb-0 text-center text-md-start">
          ©
          <script>
            document.write(new Date().getFullYear());
          </script>
          2025, made with <i class="fa fa-heart red"></i> by
          <span class="fw-bold">{{ DEVELOPER }}</span> for
          <span class="fw-bold">{{ PROJECT_TITLE }}</span>.
        </p>
      </div>
      <div
        class="col-md-6 d-flex justify-content-center justify-content-md-end"
      >
        <ul class="list-group list-group-horizontal">
          {% for link in profile.social_links.all() %}
          <li>
            <a href="{{ link.url }}" target="_blank"
              ><i class="fab fa-{{ link.icon }} d2c_icon"></i
            ></a>
          </li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
